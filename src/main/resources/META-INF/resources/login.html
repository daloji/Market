<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — Market Analyzer</title>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #c9d1d9;
      --muted:   #8b949e;
      --accent:  #f0b429;
      --blue:    #58a6ff;
      --red:     #f85149;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 44px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon { font-size: 40px; display: block; margin-bottom: 10px; }
    .logo h1   { font-size: 22px; color: var(--accent); font-weight: 700; }
    .logo p    { font-size: 12px; color: var(--muted); margin-top: 6px; }

    label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input {
      display: block;
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      margin-bottom: 18px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--blue); }

    button[type=submit] {
      display: block;
      width: 100%;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 6px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
      margin-top: 4px;
    }
    button[type=submit]:hover    { opacity: .88; }
    button[type=submit]:disabled { opacity: .45; cursor: not-allowed; }

    .error {
      background: rgba(248,81,73,.10);
      border: 1px solid rgba(248,81,73,.30);
      color: var(--red);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">
      <span class="logo-icon">📈</span>
      <h1>Market Analyzer</h1>
      <p>Connectez-vous pour accéder au tableau de bord</p>
    </div>

    <div id="error-msg" class="error"></div>

    <form id="login-form" onsubmit="doLogin(event)">
      <label for="inp-user">Identifiant</label>
      <input id="inp-user" type="text" autocomplete="username"
             placeholder="admin" required autofocus/>

      <label for="inp-pass">Mot de passe</label>
      <input id="inp-pass" type="password" autocomplete="current-password"
             placeholder="••••••••" required/>

      <button id="btn-login" type="submit">Se connecter</button>
    </form>
  </div>

  <script>
    // Déjà connecté → rediriger directement
    (async () => {
      const token = localStorage.getItem('auth_token');
      if (!token) return;
      try {
        const r = await fetch('/api/auth/check', {
          headers: { Authorization: 'Bearer ' + token }
        });
        if (r.ok) window.location.replace('/');
      } catch (_) {}
    })();

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('error-msg');
      btn.disabled = true;
      err.style.display = 'none';

      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('inp-user').value.trim(),
            password: document.getElementById('inp-pass').value
          })
        });

        if (r.ok) {
          const data = await r.json();
          localStorage.setItem('auth_token', data.token);
          window.location.replace('/');
        } else {
          err.textContent = 'Identifiant ou mot de passe incorrect.';
          err.style.display = 'block';
          btn.disabled = false;
          document.getElementById('inp-pass').value = '';
          document.getElementById('inp-pass').focus();
        }
      } catch (_) {
        err.textContent = 'Impossible de joindre le serveur.';
        err.style.display = 'block';
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
