# ─── Database (dev: H2 file) ─────────────────────────────────────────────────
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/marketdb;AUTO_SERVER=TRUE
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# ─── Database (test: in-memory H2, isolated, fresh schema each run) ──────────
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create

# ─── Database (prod: PostgreSQL) — run with -Dquarkus.profile=prod ───────────
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres-market:5432/marketdb
%prod.quarkus.datasource.username=postgres
%prod.quarkus.datasource.password=Madagascar2013
%prod.quarkus.hibernate-orm.database.generation=update

# ─── Yahoo Finance REST Client ────────────────────────────────────────────────
quarkus.rest-client.yahoo-finance.url=https://query1.finance.yahoo.com
quarkus.rest-client.yahoo-finance.scope=jakarta.inject.Singleton
quarkus.rest-client.yahoo-finance.connect-timeout=5000
quarkus.rest-client.yahoo-finance.read-timeout=10000

# ─── Scheduler ────────────────────────────────────────────────────────────────
quarkus.scheduler.enabled=true
%test.quarkus.scheduler.enabled=false

# ─── Mailer (dev: mock — emails logués, pas envoyés) ─────────────────────────
quarkus.mailer.mock=true

# ─── Mailer (dev avec Mailhog) — décommenter si docker-compose up ─────────────
# quarkus.mailer.mock=false
# quarkus.mailer.host=localhost
# quarkus.mailer.port=1025
# quarkus.mailer.from=market@localhost

# ─── Mailer (prod: SMTP réel, ex. Gmail) ─────────────────────────────────────
%prod.quarkus.mailer.mock=false
%prod.quarkus.mailer.host=smtp.gmail.com
%prod.quarkus.mailer.port=587
%prod.quarkus.mailer.start-tls=REQUIRED
%prod.quarkus.mailer.username=your-email@gmail.com
%prod.quarkus.mailer.password=your-app-password
%prod.quarkus.mailer.from=your-email@gmail.com

# ─── Alert ────────────────────────────────────────────────────────────────────
# Email destinataire des alertes BUY (laisser vide pour désactiver)
# market.alert.email=ton@email.com

# ─── OpenAPI / Swagger UI ────────────────────────────────────────────────────
quarkus.smallrye-openapi.path=/swagger
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ─── CORS ─────────────────────────────────────────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=*

# ─── Logging ──────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.market".level=DEBUG

# ─── Twelve Data (fallback #1) ───────────────────────────────────────────────
# Inscription gratuite : https://twelvedata.com/register (800 crédits/jour)
# market.datasource.twelvedata.api-key=YOUR_KEY_HERE
quarkus.rest-client.twelvedata.url=https://api.twelvedata.com
quarkus.rest-client.twelvedata.scope=jakarta.inject.Singleton
quarkus.rest-client.twelvedata.connect-timeout=5000
quarkus.rest-client.twelvedata.read-timeout=10000

