quarkus.rest-client.alphavantage.read-timeout=15000

# ─── Binance (crypto — données publiques, sans clé) ──────────────────────────
quarkus.rest-client.binance-api.url=https://api.binance.com
quarkus.rest-client.binance-api.scope=jakarta.inject.Singleton
quarkus.rest-client.binance-api.connect-timeout=5000
quarkus.rest-client.binance-api.read-timeout=10000
