# ─── Auto-trade BTC/USDT Futures ──────────────────────────────────────────────
# Seuil de confiance minimum pour déclencher un trade (0–100, défaut 70)
market.binance.futures.auto-trade.min-confidence=60
# Mise par trade en USDT (marge engagée, défaut 50 USDT)
market.binance.futures.auto-trade.amount-usdt=50
# Levier utilisé (défaut 10×)
market.binance.futures.auto-trade.leverage=3
# Stop-Loss en % depuis l'entrée (ex: 1.5 → SL à −1.5% pour LONG, +1.5% pour SHORT)
market.binance.futures.auto-trade.sl-pct=1.5
# Take-Profit en % depuis l'entrée (TP1=tp-pct, TP2=2×tp-pct, TP3=3×tp-pct)
market.binance.futures.auto-trade.tp-pct=3.0
# Fraction de la position clôturée à chaque TP (tp1-ratio + tp2-ratio + reste = 100%)
market.binance.futures.auto-trade.tp1-ratio=0.40
market.binance.futures.auto-trade.tp2-ratio=0.35
# Limite de perte journalière en USDT (bot suspendu si dépassé, repart à minuit UTC — 0 = désactivé)
market.binance.futures.auto-trade.daily-loss-limit=100

