name: Making Market
on:
  push:
    branches:
      - '**'
permissions:
  contents: write 

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin' # or 'zulu', 'corretto', etc.

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build with Maven
      run: mvn package jacoco:report  -Pnative -Dquarkus.native.container-build=true 

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
         token: ${{ secrets.CODECOV_TOKEN }}
         slug: daloji/Market
         file: target/jacoco.exec

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Generate tag and Docker version
      id: version
      if: github.ref == 'refs/heads/main'
      run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          git tag $VERSION
          git push origin $VERSION
          docker tag e-commerce-native:latest ${{ secrets.DOCKERHUB_USERNAME }}/e-commerce-native:$VERSION
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/e-commerce-native:$VERSION

    - name: Generate tag and Docker version
      if: startsWith(github.ref, 'refs/heads/feature/')
      run: |
          docker tag e-commerce-native:latest ${{ secrets.DOCKERHUB_USERNAME }}/e-commerce-native:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/e-commerce-native:latest
  
